name: Daily AdsTxt Crawl
on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:                          # ← must be indented under 'crawl'
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: DEBUG - check tvazteca fetch
        run: |
          curl -s https://api.ipify.org && echo " <- GitHub Actions outbound IP"
          python3 -c "
          import requests
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              'Accept': 'text/plain,text/html;q=0.9,*/*;q=0.8',
          }
          r = requests.get('https://tvazteca.com/app-ads.txt', headers=headers, timeout=10)
          print('status:', r.status_code)
          for k, v in r.headers.items():
              print(f'  {k}: {v}')
          print('contains sabio:', 'sabio' in r.text.lower())
          print('total chars:', len(r.text))
          "
      - name: Run crawler
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CONFIG_SHEET_ID: ${{ secrets.CONFIG_SHEET_ID }}
          RESULTS_SHEET_ID: ${{ secrets.RESULTS_SHEET_ID }}
        run: |
          python run_daily.py
